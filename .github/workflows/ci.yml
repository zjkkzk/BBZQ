name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/*'

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64-v8a
            abis: arm64-v8a
            suffix: arm64-v8a
          - label: armeabi-v7a
            abis: armeabi-v7a
            suffix: armv7a
          - label: uni
            abis: arm64-v8a,armeabi-v7a, x86_64
            suffix: uni
          - label: x86_64
            abis: x86_64
            suffix: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/*.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore release keystore
        env:
          BBZQ_KEYSTORE_BASE64: ${{ secrets.BBZQ_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$BBZQ_KEYSTORE_BASE64" ]; then
            mkdir -p signing
            printf '%s' "$BBZQ_KEYSTORE_BASE64" | base64 -d > signing/bbzq-release.jks
          fi

      - name: Export signing env
        env:
          RELEASE_STORE_FILE: signing/bbzq-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.BBZQ_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.BBZQ_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.BBZQ_KEY_PASSWORD }}
        run: |
          {
            echo "RELEASE_STORE_FILE=$RELEASE_STORE_FILE"
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Retrieve version
        run: |
          version=`awk -F "=" '$1 == "releaseName" {print $2}' gradle.properties`
          count=`git rev-list --count HEAD`
          echo "VERSION=$version-$count" >> "$GITHUB_ENV"

      - name: Build with gradle
        run: |
          chmod 777 ./gradlew
          ./gradlew --no-daemon -PbbzqAbiFilters="${{ matrix.abis }}" -PbbzqOutputSuffix="${{ matrix.suffix }}" assembleDebug assembleRelease

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bzzq-${{ env.VERSION }}-${{ matrix.label }}-debug
          path: 'app/build/outputs/apk/debug/*.apk'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bzzq-${{ env.VERSION }}-${{ matrix.label }}-release
          path: 'app/release/*.apk'
