name: 新功能请求
description: Suggest an idea or improvement
labels: [enhancement]
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 这项功能建议是为了解决什么问题？
      placeholder: 例如：当前无法在某个场景下方便地完成...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望的方案
      description: 你希望 BBZQ 怎么做？
      placeholder: 例如：希望增加一个开关 / 一个选项 / 一个自动处理逻辑
    validations:
      required: true
