name: Bug 反馈
description: Report a bug or unexpected behavior
labels: [bug]
title: "[Bug] "
body:
  - type: textarea
    id: problem_description
    attributes:
      label: 问题描述 & 复现步骤
      description: 详细描述出现了什么异常，一步步写出如何复现该问题
      placeholder: |
        1. 操作步骤：打开B站 -> 进入分区页 -> 开启XX功能
        2. 实际现象：点击按钮APP直接闪退 / 功能不生效 / 界面错乱
        3. 出现频率：每次必现 / 偶尔复现 / 特定条件才触发
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 预期正常表现
      description: 该操作原本应该呈现什么样的效果
      placeholder: 例：开启该开关后应屏蔽对应广告，页面正常加载无崩溃
    validations:
      required: true

  - type: checkboxes
    id: confirm_latest_build
    attributes:
      label: 提交自检
      options:
        - label: 我已下载项目最新 CI 构建版本测试，问题在新版依然可以复现
          required: true

  - type: markdown
    attributes:
      value: |
        ## 📱 环境信息填写指引
        打开 BBZQ 模块设置，双击页面底部「版本」字样，复制弹窗内完整 `runtimeEnvironment` JSON，对照填写下方信息，避免版本不符导致无法定位问题。

  - type: input
    id: bili_version_name
    attributes:
      label: B站客户端版本名
      description: 对应 runtimeEnvironment.hostVersionName
      placeholder: 示例：8.98.0
    validations:
      required: true

  - type: input
    id: module_version_code
    attributes:
      label: BBZQ 模组版本号
      description: 对应 runtimeEnvironment.moduleVersionCode
      placeholder: 示例：91
    validations:
      required: true

  - type: input
    id: framework_name
    attributes:
      label: Xposed 运行框架名称
      description: 对应 runtimeEnvironment.xposedFrameworkName
      placeholder: 示例：LSPosed / Vector / NPatch
    validations:
      required: true

  - type: input
    id: framework_version
    attributes:
      label: 框架版本号
      description: 对应 runtimeEnvironment.xposedFrameworkVersionCode
      placeholder: 示例：7776, 3047, 689
    validations:
      required: true

  - type: textarea
    id: runtime_environment
    attributes:
      label: 完整 runtimeEnvironment 原始 JSON
      description: 直接粘贴双击版本弹出的完整 JSON 文本，便于快速核对环境
      render: json
    validations:
      required: true

  - type: textarea
    id: log_content
    attributes:
      label: 崩溃日志 / 异常日志（可选，强烈建议附上）
      description: 闪退、Hook异常类问题请附上 LSPosed/Vector/NPatch 管理器日志、系统崩溃日志、BBZQ 内部日志，大幅提升排查效率
      placeholder: 粘贴日志内容，过长可上传日志文件附件
    validations:
      required: false
